<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>柴柴管家 AI LINE Bot · 體驗 Demo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100vw; height: 100vh; overflow: hidden;
    font-family: "Microsoft JhengHei", "微軟正黑體", -apple-system, BlinkMacSystemFont, sans-serif;
    background: #000; color: #333;
    user-select: none; -webkit-user-select: none;
  }
  #app {
    width: 100vw; height: 100vh; max-width: 480px; margin: 0 auto;
    background: #F5F5F5; display: flex; flex-direction: column;
    overflow: hidden; position: relative;
  }
  @media (min-width: 600px) {
    body {
      background: linear-gradient(135deg, #4B9B7B 0%, #06C755 50%, #2A8597 100%);
      display: flex; align-items: center; justify-content: center;
    }
    #app {
      height: 90vh; max-height: 800px; width: 380px;
      border-radius: 32px; box-shadow: 0 30px 80px rgba(0,0,0,0.4);
      border: 8px solid #1A252F;
    }
  }
  .status-bar {
    background: white; padding: 6px 20px 4px;
    display: flex; justify-content: space-between; align-items: center;
    font-size: 14px; font-weight: 700; color: #333; flex-shrink: 0;
  }
  .line-header {
    background: linear-gradient(135deg, #06C755 0%, #4DBC8B 100%);
    color: white; padding: 10px 14px;
    display: flex; align-items: center; gap: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1); flex-shrink: 0;
  }
  .header-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: white; overflow: hidden; border: 2px solid white; flex-shrink: 0;
  }
  .header-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .header-name { flex: 1; min-width: 0; }
  .header-title { font-size: 14px; font-weight: 700; }
  .header-sub { font-size: 11px; opacity: 0.9; }
  .header-icons { display: flex; gap: 10px; font-size: 18px; }
  .main-content { flex: 1; overflow: hidden; position: relative; display: flex; flex-direction: column; }
  .chat-area {
    flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
    padding: 14px 10px;
    background: linear-gradient(180deg, #E8F0EC 0%, #D8E8E0 100%);
  }
  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); border-radius: 2px; }
  .splash {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 24px 20px;
    background: linear-gradient(180deg, #E8F0EC 0%, #C8E8DC 60%, #A8D8C2 100%);
    text-align: center; overflow-y: auto;
  }
  .splash-video-wrapper {
    width: 220px; height: 240px; border-radius: 16px;
    overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    margin-bottom: 20px; background: white; position: relative;
  }
  .splash-video { width: 100%; height: 100%; object-fit: cover; }
  .splash-title { font-size: 26px; font-weight: 800; color: #2A8597; margin-bottom: 8px; line-height: 1.2; }
  .splash-subtitle { font-size: 14px; color: #555; margin-bottom: 22px; line-height: 1.6; }
  .splash-btn {
    background: linear-gradient(135deg, #06C755 0%, #2A8597 100%);
    color: white; border: none; padding: 14px 36px;
    border-radius: 30px; font-size: 16px; font-weight: 700;
    cursor: pointer; box-shadow: 0 8px 20px rgba(6,199,85,0.4);
  }
  .splash-btn:active { transform: scale(0.96); }
  .splash-hint { font-size: 11px; color: #888; margin-top: 18px; line-height: 1.5; }
  .splash-footer {
    margin-top: 22px; font-size: 9px; color: #777; font-style: italic;
    line-height: 1.6; padding: 10px 14px;
    background: rgba(255,255,255,0.6); border-radius: 10px; max-width: 280px;
  }
  .msg-row {
    display: flex; margin-bottom: 10px; align-items: flex-end; gap: 6px;
    animation: slideIn 0.3s ease-out;
  }
  @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .msg-row.user { justify-content: flex-end; }
  .msg-avatar { width: 30px; height: 30px; border-radius: 50%; overflow: hidden; background: white; flex-shrink: 0; }
  .msg-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .bubble {
    max-width: 75%; padding: 8px 12px; border-radius: 16px;
    font-size: 14px; line-height: 1.5; word-wrap: break-word;
    box-shadow: 0 1px 2px rgba(0,0,0,0.1);
  }
  .bubble.bot { background: white; color: #333; border-bottom-left-radius: 4px; }
  .bubble.user { background: #06C755; color: white; border-bottom-right-radius: 4px; }
  .typing { display: flex; gap: 4px; padding: 10px 14px; background: white; border-radius: 16px; border-bottom-left-radius: 4px; width: fit-content; }
  .typing span { width: 7px; height: 7px; background: #999; border-radius: 50%; animation: typing 1.4s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typing { 0%, 60%, 100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-6px); opacity: 1; } }
  .bot-card {
    background: white; border-radius: 12px; padding: 12px; margin-top: 4px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    max-width: calc(75vw - 36px); width: 100%; min-width: 260px;
  }
  .card-header { font-weight: 700; color: #2A8597; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid #eee; font-size: 13px; }
  .card-header.alert { color: #E63946; }
  .card-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; font-size: 12px; color: #555; }
  .card-row.big { font-size: 14px; padding: 7px 0; border-bottom: 1px dashed #eee; }
  .card-row.big-amount { border-top: 1px solid #eee; margin-top: 8px; padding-top: 12px; font-size: 15px; color: #333; font-weight: 700; }
  .card-row .amount { color: #E63946; font-size: 22px; }
  .card-row .green { color: #2E8E65; font-weight: 600; }
  .card-row .orange { color: #F57C20; font-weight: 600; }
  .card-row .red { color: #E63946; font-weight: 600; }
  .card-footer { font-size: 11px; color: #999; text-align: center; margin-top: 8px; padding-top: 8px; border-top: 1px dashed #eee; font-style: italic; }
  .card-input { width: 100%; padding: 9px; border: 2px solid #06C755; border-radius: 8px; font-size: 14px; text-align: center; margin: 6px 0; background: #F0FFF4; font-weight: 700; font-family: inherit; }
  .line-pay-btn { width: 100%; background: linear-gradient(135deg, #06C755 0%, #2A8597 100%); color: white; border: none; padding: 11px; border-radius: 8px; font-size: 13px; font-weight: 700; margin-top: 10px; cursor: pointer; }
  .weather-card { text-align: center; }
  .weather-temp { font-size: 44px; font-weight: 800; color: #F57C20; margin: 6px 0; }
  .weather-desc { font-size: 15px; color: #555; margin-bottom: 10px; }
  .aqi-card { text-align: center; }
  .aqi-value { font-size: 52px; font-weight: 800; color: #3FB682; line-height: 1; margin: 6px 0; }
  .aqi-status { display: inline-block; padding: 3px 14px; border-radius: 16px; font-size: 13px; font-weight: 700; margin-bottom: 10px; }
  .aqi-status.good { background: #D7ECDB; color: #2E8E65; }
  .parking-item { padding: 9px 0; border-bottom: 1px solid #eee; font-size: 13px; }
  .parking-item:last-child { border-bottom: none; }
  .parking-item small { color: #888; font-size: 11px; }
  .scan-card { background: #1A252F; color: white; text-align: center; padding: 16px; }
  .scan-frame {
    width: 180px; height: 180px; margin: 0 auto; position: relative;
    background:
      linear-gradient(#06C755, #06C755) top left no-repeat,
      linear-gradient(#06C755, #06C755) top left no-repeat,
      linear-gradient(#06C755, #06C755) top right no-repeat,
      linear-gradient(#06C755, #06C755) top right no-repeat,
      linear-gradient(#06C755, #06C755) bottom left no-repeat,
      linear-gradient(#06C755, #06C755) bottom left no-repeat,
      linear-gradient(#06C755, #06C755) bottom right no-repeat,
      linear-gradient(#06C755, #06C755) bottom right no-repeat;
    background-size: 3px 30px, 30px 3px, 3px 30px, 30px 3px, 3px 30px, 30px 3px, 3px 30px, 30px 3px;
    overflow: hidden;
  }
  .scan-qr { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); }
  .scan-qr-inner {
    width: 100px; height: 100px;
    background-image:
      linear-gradient(white 4px, transparent 4px),
      linear-gradient(90deg, white 4px, transparent 4px),
      radial-gradient(white 2px, transparent 2px),
      radial-gradient(white 2px, transparent 2px);
    background-size: 12px 12px, 12px 12px, 8px 8px, 16px 16px;
    background-position: 0 0, 0 0, 4px 4px, 0 0;
    opacity: 0.7;
  }
  .scan-line { position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: linear-gradient(90deg, transparent, #06C755, transparent); box-shadow: 0 0 10px #06C755; animation: scanmove 2s ease-in-out infinite; }
  @keyframes scanmove { 0%, 100% { top: 5%; } 50% { top: 90%; } }
  .scan-hint { color: white; font-size: 13px; margin-top: 12px; font-weight: 600; }
  .alert-card { border-left: 4px solid #E63946; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0 6px 36px; }
  .chip { background: white; border: 1.5px solid #06C755; color: #06C755; padding: 6px 14px; border-radius: 16px; font-size: 12px; cursor: pointer; font-weight: 600; animation: slideIn 0.3s ease-out; }
  .chip:active { background: #06C755; color: white; }
  .rich-menu { background: white; border-top: 1px solid #ddd; padding: 8px 6px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; flex-shrink: 0; }
  .rich-btn { background: linear-gradient(135deg, #F0F7FA 0%, #D8E8E0 100%); border: 1px solid #C8E0DC; padding: 10px 4px; border-radius: 10px; text-align: center; cursor: pointer; font-size: 11px; font-weight: 600; color: #2A8597; transition: all 0.15s; }
  .rich-btn:active { background: linear-gradient(135deg, #06C755 0%, #2A8597 100%); color: white; transform: scale(0.95); }
  .rich-btn .icon { font-size: 22px; display: block; margin-bottom: 2px; }
  .sub-menu { flex: 1; overflow-y: auto; padding: 16px 14px; background: linear-gradient(180deg, #E8F0EC 0%, #FFFFFF 100%); }
  .sub-menu-title { font-size: 17px; font-weight: 700; color: #2A8597; margin-bottom: 12px; text-align: center; }
  .sub-item { background: white; padding: 14px; border-radius: 10px; margin-bottom: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); cursor: pointer; display: flex; align-items: center; gap: 12px; transition: transform 0.15s; }
  .sub-item:active { transform: scale(0.98); background: #F0FFF4; }
  .sub-item .sub-icon { font-size: 22px; background: linear-gradient(135deg, #06C755 0%, #2A8597 100%); color: white; width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .sub-item .sub-name { flex: 1; font-size: 14px; font-weight: 600; color: #333; }
  .sub-item .arrow { color: #06C755; font-size: 18px; }
  .back-btn { background: white; border: 1.5px solid #06C755; color: #06C755; padding: 7px 14px; border-radius: 18px; font-size: 12px; cursor: pointer; margin-bottom: 12px; font-weight: 600; }
  .chat-divider { text-align: center; color: #666; font-size: 11px; margin: 12px 0 6px; padding: 4px 0; background: rgba(255,255,255,0.5); border-radius: 10px; }
  .toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.85); color: white; padding: 20px 28px; border-radius: 16px; font-size: 14px; z-index: 9999; max-width: 80%; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); animation: toastIn 0.3s ease-out; line-height: 1.6; }
  @keyframes toastIn { from { opacity: 0; transform: translate(-50%, -50%) scale(0.8); } to { opacity: 1; transform: translate(-50%, -50%) scale(1); } }
  .toast-icon { font-size: 36px; display: block; margin-bottom: 10px; }
  .toast-close { background: #06C755; border: none; color: white; padding: 8px 20px; border-radius: 20px; margin-top: 12px; font-weight: 600; cursor: pointer; font-size: 13px; }
</style>
</head>

function renderRichMenu() {
  richMenu.innerHTML = MENU.map(m => `<div class="rich-btn" onclick="onMenuClick('${m.id}')"><span class="icon">${m.icon}</span>${m.title}</div>`).join('');
}
function startChat() {
  splash.style.display = 'none';
  chatArea.style.display = 'block';
  richMenu.style.display = 'grid';
  renderRichMenu();
  setTimeout(() => {
    addBotMessage('汪汪！我是柴柴管家 🐕');
    setTimeout(() => addBotMessage('請選擇下方功能，柴柴會為您介紹～'), 800);
  }, 200);
}
function onMenuClick(catId) {
  const cat = MENU.find(m => m.id === catId);
  if (!cat) return;
  if (cat.direct) {
    chatArea.style.display = 'block';
    subMenu.style.display = 'none';
    playScenario(cat.direct);
    return;
  }
  openSubMenu(cat);
}
function openSubMenu(cat) {
  chatArea.style.display = 'none';
  subMenu.style.display = 'block';
  subMenu.innerHTML = `<button class="back-btn" onclick="backToChat()">← 返回對話</button><div class="sub-menu-title">${cat.icon} ${cat.title}</div>` +
    cat.items.map(itemId => {
      let label = SUB_ITEM_LABEL[itemId] || itemId;
      let icon = '';
      if (SCENARIOS[itemId]) icon = SCENARIOS[itemId].icon;
      if (itemId === 'moto') icon = '🛵';
      const m = label.match(/^(\S+) /);
      if (m && !icon) icon = m[1];
      return `<div class="sub-item" onclick="handleSubClick('${itemId}')"><div class="sub-icon">${icon || '·'}</div><div class="sub-name">${label}</div><div class="arrow">›</div></div>`;
    }).join('');
}
function handleSubClick(itemId) {
  if (itemId === 'moto') {
    if (!motoScanned) { motoScanned = true; playScenario('moto_scan'); }
    else { playScenario('moto_recall'); }
    return;
  }
  playScenario(itemId);
}
function backToChat() { subMenu.style.display = 'none'; chatArea.style.display = 'block'; scrollToBottom(); }
function playScenario(id) {
  if (isPlaying) return;
  isPlaying = true;
  const s = SCENARIOS[id];
  if (!s) { isPlaying = false; return; }
  subMenu.style.display = 'none';
  chatArea.style.display = 'block';
  addDivider(s.title);
  let delay = 200;
  s.script.forEach((item, idx) => {
    setTimeout(() => {
      if (item.type === 'user') addUserMessage(item.text);
      else if (item.type === 'bot') showTyping(() => addBotMessage(item.text));
      else if (item.type === 'card') showTyping(() => addBotCard(item.html));
      else if (item.type === 'chips') addChips(item.items);
      if (idx === s.script.length - 1) setTimeout(() => { isPlaying = false; }, 500);
    }, delay);
    delay += (item.type === 'card' ? 1400 : item.type === 'bot' ? 900 : item.type === 'user' ? 600 : 400);
  });
}
function addDivider(title) {
  const d = document.createElement('div');
  d.className = 'chat-divider';
  d.textContent = '── ' + title + ' ──';
  chatArea.appendChild(d);
  scrollToBottom();
}
function addUserMessage(text) {
  const row = document.createElement('div');
  row.className = 'msg-row user';
  row.innerHTML = `<div class="bubble user">${text}</div>`;
  chatArea.appendChild(row); scrollToBottom();
}
function addBotMessage(text) {
  const row = document.createElement('div');
  row.className = 'msg-row';
  row.innerHTML = `<div class="msg-avatar"><img src="${AVATAR}" alt=""></div><div class="bubble bot">${text}</div>`;
  chatArea.appendChild(row); scrollToBottom();
}
function addBotCard(html) {
  const row = document.createElement('div');
  row.className = 'msg-row';
  row.innerHTML = `<div class="msg-avatar"><img src="${AVATAR}" alt=""></div><div>${html}</div>`;
  chatArea.appendChild(row); scrollToBottom();
}
function showTyping(callback) {
  const row = document.createElement('div');
  row.className = 'msg-row';
  row.innerHTML = `<div class="msg-avatar"><img src="${AVATAR}" alt=""></div><div class="typing"><span></span><span></span><span></span></div>`;
  chatArea.appendChild(row); scrollToBottom();
  setTimeout(() => { chatArea.removeChild(row); callback(); }, 800);
}
function addChips(items) {
  const div = document.createElement('div');
  div.className = 'chips';
  items.forEach(item => {
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.textContent = item;
    chip.onclick = () => {
      if (item.startsWith('⬅')) addDivider('返回主選單');
      else if (item.includes('導航')) showToast();
    };
    div.appendChild(chip);
  });
  chatArea.appendChild(div); scrollToBottom();
}
function showToast() {
  const t = document.createElement('div');
  t.className = 'toast';
  t.innerHTML = `<span class="toast-icon">🗺</span>此功能將會跳轉<br>Google Maps<br><button class="toast-close" onclick="this.parentElement.remove()">確定</button>`;
  document.body.appendChild(t);
  setTimeout(() => { if (t.parentElement) t.remove(); }, 3500);
}
function scrollToBottom() { setTimeout(() => { chatArea.scrollTop = chatArea.scrollHeight; }, 50); }
</script>
</body>
</html>
